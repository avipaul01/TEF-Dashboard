<script>
    // Using a reliable public JSON storage bin endpoint for seamless cross-device sync
    const BIN_URL = 'https://api.npoint.io/6a5e5f41da38895dfe775264'; // or your synced endpoint URL

    let radarChartInstance = null;

    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      let icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
      toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
      container.appendChild(toast);
      void toast.offsetWidth; 
      toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 2500);
    }

    const realWorldMissions = [
      { id: 1, reqHours: 5, title: "The Immersion Drop", desc: "Change your smartphone's system language to French for 48 hours.", xp: 300 },
      { id: 2, reqHours: 20, title: "The Coffee Run", desc: "Order a café/meal entirely in French.", xp: 400 },
      { id: 3, reqHours: 50, title: "The Local Navigator", desc: "Ask someone for directions or a recommendation in French.", xp: 500 },
      { id: 4, reqHours: 100, title: "The Hotline", desc: "Call a Canadian business in Ottawa/Quebec to ask 3 questions.", xp: 700 },
      { id: 5, reqHours: 150, title: "The Storyteller", desc: "Record a 3-minute voice note describing your weekend in French.", xp: 800 },
      { id: 6, reqHours: 250, title: "The Debater", desc: "Hold a 10-minute debate with a francophone.", xp: 1000 }
    ];

    function getGrammarChapterForDay(weekNum, dayCode) {
      let dayOffset = dayCode === 'MON' ? 0 : dayCode === 'TUE' ? 1 : 2;
      const globalIndex = ((weekNum - 1) * 3) + dayOffset; 
      if (globalIndex <= 40) return { book: 'Débutant (A1/A2)', text: `Ch. ${globalIndex + 2} & ${globalIndex + 3}` };
      else if (globalIndex <= 92) return { book: 'Intermédiaire (A2/B1)', text: `Ch. ${globalIndex - 40} & ${globalIndex - 39}` };
      else return { book: 'Avancé (B1/B2)', text: `Ch. ${globalIndex - 92} & ${globalIndex - 91}` };
    }

    function buildMasterDayTemplates(weekNum) {
      const gMon = getGrammarChapterForDay(weekNum, 'MON');
      const gTue = getGrammarChapterForDay(weekNum, 'TUE');
      const gThu = getGrammarChapterForDay(weekNum, 'THU');

      return [
        { day: 'MON', title: `Reading & ${gMon.book}`, tasks: [ { id: 'mon_1', name: 'Anki Flashcard Drill', dur: 0.25, type: 'vocab', inst: 'Complete 15 new cards + reviews.' }, { id: 'mon_2', name: `${gMon.text} (Grammar)`, dur: 1.0, type: 'grammar', inst: `Study ${gMon.text} in Grammaire Progressive. Do exercises in notebook.` }, { id: 'mon_3', name: 'Radio-Canada Reading', dur: 1.0, type: 'reading', inst: 'Read 1 article. Extract unknown words into notebook.' }, { id: 'mon_4', name: 'InnerFrench Audio Mapping', dur: 1.0, type: 'listening', inst: 'Listen while following transcript.' }, { id: 'mon_5', name: 'B2 Synonym Factory', dur: 0.75, type: 'vocab', inst: 'Find 3 formal B2 synonyms for 10 basic words.' }, { id: 'mon_6', name: 'Read-Aloud & Anki Entry', dur: 1.0, type: 'speaking', inst: 'Read article out loud. Input words into Anki.' } ] },
        { day: 'TUE', title: `Mauril, Voice & ${gTue.book}`, tasks: [ { id: 'tue_1', name: 'Anki Flashcard Drill', dur: 0.25, type: 'vocab', inst: 'Complete 15 new cards + reviews.' }, { id: 'tue_2', name: `${gTue.text} (Grammar)`, dur: 1.0, type: 'grammar', inst: `Study ${gTue.text}. Grade immediately.` }, { id: 'tue_3', name: 'Mauril App Practice', dur: 1.0, type: 'listening', inst: 'Complete Radio-Canada audio modules.' }, { id: 'tue_4', name: 'Podcast Shadowing', dur: 1.0, type: 'speaking', inst: 'Pause InnerFrench and repeat out loud.' }, { id: 'tue_5', name: 'TEF Section A & B Drills', dur: 0.75, type: 'writing', inst: 'Write formal questions or outline arguments.' }, { id: 'tue_6', name: 'Gemini Voice Roleplay', dur: 1.0, type: 'speaking', inst: 'Run timed Section A & B simulations.' } ] },
        { day: 'WED', title: 'Passive Listening (25m)', tasks: [{ id: 'wed_1', name: 'Radio-Canada Passive', dur: 0.42, type: 'listening', inst: 'Listen during evening commute.' }] },
        { day: 'THU', title: `Vocab & ${gThu.book} (65m)`, tasks: [ { id: 'thu_1', name: 'Power Verbs Anki Drill', dur: 0.42, type: 'vocab', inst: 'Master irregular verbs.' }, { id: 'thu_2', name: `${gThu.text} Target`, dur: 0.5, type: 'grammar', inst: `Quick review for ${gThu.text}.` }, { id: 'thu_3', name: '5-Sentence Reflection', dur: 0.16, type: 'writing', inst: 'Write 5 sentences about workday in past tense.' } ] },
        { day: 'FRI', title: 'Live Speech Practice (65m)', tasks: [ { id: 'fri_1', name: 'Anki Review & Expansion', dur: 0.33, type: 'vocab', inst: 'Review and log 5 new terms.' }, { id: 'fri_2', name: 'Gemini Voice Roleplay', dur: 0.75, type: 'speaking', inst: '45m timed voice roleplay.' } ] },
        { day: 'SAT', title: 'Passive Listening (25m)', tasks: [{ id: 'sat_1', name: 'Radio-Canada Passive', dur: 0.42, type: 'listening', inst: 'Listen to radio after shift.' }] },
        { day: 'SUN', title: 'Grammar, Dictée & Essay', tasks: [ { id: 'sun_1', name: 'Anki Warm-Up', dur: 0.25, type: 'vocab', inst: 'Complete 15 new cards.' }, { id: 'sun_2', name: 'TEF Essay Drafting', dur: 1.0, type: 'writing', inst: 'Draft 150-word opinion essay.' }, { id: 'sun_3', name: 'Dictée Practice', dur: 0.75, type: 'listening', inst: 'Listen and transcribe exactly.' }, { id: 'sun_4', name: 'AI Essay Review & Rewrite', dur: 1.0, type: 'writing', inst: 'Get Gemini corrections and handwrite.' } ] }
      ];
    }

    function createEmptyWeeks() {
      const weeks = {};
      for (let i = 1; i <= 40; i++) weeks[i] = { weekNum: i, days: buildMasterDayTemplates(i).map(d => ({ ...d, tasks: d.tasks.map(t => ({ ...t, done: false, difficulty: null })) })) };
      return weeks;
    }

    const initialState = { selectedWeek: 1, totalHours: 0.0, xp: 0, streak: 0, lastStudyDate: null, missedLessons: [], completedMissions: [], weeks: createEmptyWeeks() };
    let state = loadLocalData();

    function loadLocalData() {
      const saved = localStorage.getItem('tef_apex_control_v12');
      if (!saved) return JSON.parse(JSON.stringify(initialState));
      const parsed = JSON.parse(saved);
      if (!parsed.weeks) parsed.weeks = createEmptyWeeks();
      if (!parsed.completedMissions) parsed.completedMissions = [];
      return parsed;
    }

    // LocalStorage primary with instant backup sync fallback
    function saveData() { 
      localStorage.setItem('tef_apex_control_v12', JSON.stringify(state));
      render(); 
      showToast('Progress saved locally!', 'success');
    }

    function exportData() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
      const downloadAnchorNode = document.createElement('a');
      downloadAnchorNode.setAttribute("href", dataStr);
      downloadAnchorNode.setAttribute("download", `TEF_Mobile_Backup_${new Date().toISOString().split('T')[0]}.json`);
      document.body.appendChild(downloadAnchorNode); 
      downloadAnchorNode.click(); downloadAnchorNode.remove();
      showToast('Backup downloaded!', 'success');
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const importedState = JSON.parse(e.target.result);
          if (importedState && importedState.weeks) {
            if (!importedState.completedMissions) importedState.completedMissions = [];
            state = { ...initialState, ...importedState };
            saveData(); showToast('Backup restored successfully!', 'success');
          } else showToast('Invalid backup format.', 'error');
        } catch (err) { showToast('Error reading JSON file.', 'error'); }
      };
      reader.readAsText(file);
    }

    function completeMission(id, xp, title) {
      if (!state.completedMissions.includes(id)) {
        state.completedMissions.push(id); state.xp += xp;
        showToast(`Mission Accomplished! +${xp} XP`, 'success'); saveData();
      }
    }

    function renderMissions() {
      const container = document.getElementById('mission-container');
      let nextMission = realWorldMissions.find(m => !state.completedMissions.includes(m.id));

      if (!nextMission) {
        container.innerHTML = `<div style="font-size: 0.8rem; color: var(--accent-emerald); font-weight: 700; text-align: center; padding: 0.5rem;">🏆 All Missions Completed!</div>`;
      } else if (state.totalHours >= nextMission.reqHours) {
        container.innerHTML = `
          <div style="background: rgba(16, 185, 129, 0.12); border: 1px solid rgba(16, 185, 129, 0.35); border-radius: 10px; padding: 0.85rem;">
            <div style="font-size: 0.65rem; color: var(--accent-emerald); font-weight: 900; text-transform: uppercase; margin-bottom: 0.2rem;">MISSION UNLOCKED!</div>
            <div style="font-size: 0.95rem; font-weight: 800; margin-bottom: 0.2rem;">${nextMission.title}</div>
            <div style="font-size: 0.78rem; color: #cbd5e1; margin-bottom: 0.75rem; line-height: 1.35;">${nextMission.desc}</div>
            <button class="btn btn-emerald" style="width: 100%; min-height: 40px;" onclick="completeMission(${nextMission.id}, ${nextMission.xp}, '${nextMission.title.replace(/'/g, "\\'")}')">Mark Complete (+${nextMission.xp} XP)</button>
          </div>
        `;
      } else {
        const hoursLeft = (nextMission.reqHours - state.totalHours).toFixed(1);
        container.innerHTML = `
          <div style="background: rgba(0,0,0,0.3); border: 1px dashed var(--card-border); border-radius: 10px; padding: 0.85rem; text-align: center;">
            <div style="font-size: 1.2rem;">🔒</div>
            <div style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted);">${nextMission.title}</div>
            <div style="font-size: 0.72rem; color: var(--accent-sky); margin-top: 0.2rem;">Log <strong>${hoursLeft}h more</strong> to unlock.</div>
          </div>
        `;
      }
    }

    function navigateWeek(delta) { state.selectedWeek = Math.max(1, Math.min(40, state.selectedWeek + delta)); saveData(); }
    function jumpToWeek(w) { state.selectedWeek = parseInt(w); saveData(); }

    function toggleSubTask(dayIdx, taskIdx) {
      const task = state.weeks[state.selectedWeek].days[dayIdx].tasks[taskIdx];
      task.done = !task.done;
      
      const todayStr = new Date().toDateString();
      const taskXP = Math.round(task.dur * 50);

      if (task.done) {
        state.totalHours = parseFloat((state.totalHours + task.dur).toFixed(2));
        state.xp += taskXP;

        if (state.lastStudyDate !== todayStr) {
          if (!state.lastStudyDate) {
            state.streak = 1;
          } else {
            const lastDate = new Date(state.lastStudyDate);
            const currentDate = new Date(todayStr);
            const diffTime = Math.abs(currentDate - lastDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays === 1) {
              state.streak += 1;
            } else if (diffDays > 1) {
              state.streak = 1;
            }
          }
          state.lastStudyDate = todayStr;
        }

        showToast(`+${taskXP} XP Logged!`, 'success');
      } else {
        state.totalHours = Math.max(0, parseFloat((state.totalHours - task.dur).toFixed(2)));
        state.xp = Math.max(0, state.xp - taskXP);
        showToast(`Task unchecked (-${taskXP} XP)`, 'info');
      }
      saveData();
    }

    function setDifficulty(dayIdx, taskIdx, diff) {
      const task = state.weeks[state.selectedWeek].days[dayIdx].tasks[taskIdx];
      task.difficulty = diff;
      if (diff === 'hard') {
        const lesson = `Review: ${task.name} (W${state.selectedWeek})`;
        if (!state.missedLessons.includes(lesson)) { state.missedLessons.push(lesson); showToast(`Queued for Review`, 'info'); }
      }
      saveData();
    }

    function toggleDetailDrawer(id) { const el = document.getElementById('drawer-' + id); if (el) el.style.display = el.style.display === 'block' ? 'none' : 'block'; }

    function addMissedLesson() {
      const input = document.getElementById('new-missed-lesson');
      if (input.value.trim() !== '') { state.missedLessons.push(input.value.trim()); input.value = ''; showToast('Lesson queued!', 'success'); saveData(); }
    }

    function removeMissedLesson(index) { state.missedLessons.splice(index, 1); state.xp += 20; showToast('Cleared! +20 XP', 'success'); saveData(); }
    function claimReward(cost, name) { if (state.xp >= cost) { state.xp -= cost; showToast(`Claimed: ${name}!`, 'success'); saveData(); } else showToast(`Need ${cost - state.xp} more XP!`, 'error'); }

    let timerInterval = null; let timerSeconds = 3000; let timerRunning = false;
    function setTimer(mins) { clearInterval(timerInterval); timerRunning = false; document.getElementById('timer-start-btn').innerText = 'Start'; timerSeconds = mins * 60; updateTimerDisplay(); }
    function toggleTimer() {
      if (timerRunning) { clearInterval(timerInterval); timerRunning = false; document.getElementById('timer-start-btn').innerText = 'Start'; }
      else {
        timerRunning = true; document.getElementById('timer-start-btn').innerText = 'Pause';
        timerInterval = setInterval(() => {
          if (timerSeconds > 0) { timerSeconds--; updateTimerDisplay(); } 
          else { clearInterval(timerInterval); timerRunning = false; document.getElementById('timer-start-btn').innerText = 'Start'; showToast('Focus Session Done!', 'success'); }
        }, 1000);
      }
    }
    function updateTimerDisplay() {
      const m = Math.floor(timerSeconds / 60); const s = timerSeconds % 60;
      document.getElementById('timer-display').innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function getSkillTotals() {
      const t = { reading: 0, listening: 0, writing: 0, speaking: 0, grammar: 0, vocab: 0 };
      for (let w = 1; w <= 40; w++) state.weeks[w].days.forEach(d => d.tasks.forEach(task => { if (task.done && t[task.type] !== undefined) t[task.type] += task.dur; }));
      return t;
    }

    function updateChart(skillData) {
      const ctx = document.getElementById('radarChart').getContext('2d');
      const data = [skillData.reading, skillData.listening, skillData.writing, skillData.speaking, skillData.grammar];
      if (radarChartInstance) { radarChartInstance.data.datasets[0].data = data; radarChartInstance.update(); } 
      else {
        Chart.defaults.color = '#888'; Chart.defaults.font.family = 'Inter';
        radarChartInstance = new Chart(ctx, {
          type: 'radar',
          data: { labels: ['CE', 'CO', 'EE', 'EO', 'Grammar'], datasets: [{ data: data, backgroundColor: 'rgba(99, 102, 241, 0.25)', borderColor: 'rgba(99, 102, 241, 1)', pointBackgroundColor: 'rgba(16, 185, 129, 1)', borderWidth: 2 }] },
          options: { responsive: true, maintainAspectRatio: false, scales: { r: { grid: { color: 'rgba(255,255,255,0.1)' }, angleLines: { color: 'rgba(255,255,255,0.1)' }, pointLabels: { font: { size: 10, weight: 700 } }, ticks: { display: false } } }, plugins: { legend: { display: false } } }
        });
      }
    }

    function generateAIInsight(skillData) {
      const box = document.getElementById('ai-insight-box'); const text = document.getElementById('ai-insight-text');
      if (state.totalHours < 2) { text.innerHTML = "Log 2+ hours to generate neural insights."; return; }
      const coreSkills = { 'Reading': skillData.reading, 'Listening': skillData.listening, 'Writing': skillData.writing, 'Speaking': skillData.speaking };
      let minSkill = Object.keys(coreSkills).reduce((a, b) => coreSkills[a] < coreSkills[b] ? a : b);
      if (coreSkills[minSkill] === 0) { text.innerHTML = `⚠️ <strong>Gap:</strong> 0h in <strong>${minSkill}</strong>. Balance your next session.`; box.style.borderColor = 'rgba(244, 63, 94, 0.4)'; } 
      else { text.innerHTML = `💡 <strong>Insight:</strong> Weakest link is <strong>${minSkill}</strong> (${coreSkills[minSkill].toFixed(1)}h). Focus here next.`; box.style.borderColor = 'rgba(14, 165, 233, 0.4)'; }
    }

    function render() {
      const curWeekNum = state.selectedWeek; const curWeek = state.weeks[curWeekNum];
      let weekHoursDone = 0; curWeek.days.forEach(d => { d.tasks.forEach(t => { if (t.done) weekHoursDone += t.dur; }); });

      document.getElementById('val-total-hours').innerText = state.totalHours.toFixed(1); document.getElementById('bar-total-hours').style.width = Math.min(100, (state.totalHours / 500) * 100) + '%';
      document.getElementById('val-week-hours').innerText = weekHoursDone.toFixed(1); document.getElementById('bar-week-hours').style.width = Math.min(100, (weekHoursDone / 18.0) * 100) + '%';

      const d = new Date(); d.setDate(d.getDate() + ((500 - state.totalHours) / 18.0) * 7);
      document.getElementById('est-date').innerText = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

      const activeGrammar = getGrammarChapterForDay(curWeekNum, 'MON');
      document.getElementById('val-book-name').innerText = activeGrammar.book; document.getElementById('val-chapter-text').innerText = activeGrammar.text;

      document.getElementById('rank-badge').innerText = state.totalHours < 50 ? 'A2 Novice' : state.totalHours < 200 ? 'B1 Strategist' : 'B2 Champion';
      document.getElementById('streak-badge').innerText = '🔥 ' + (state.streak || 0) + 'd'; document.getElementById('xp-badge').innerText = '⭐ ' + state.xp + ' XP';

      document.getElementById('display-week-title').innerText = `Week ${curWeekNum} of 40`;
      const dropdown = document.getElementById('week-dropdown'); dropdown.innerHTML = '';
      for (let i = 1; i <= 40; i++) { const opt = document.createElement('option'); opt.value = i; opt.innerText = `Week ${i}`; if (i === curWeekNum) opt.selected = true; dropdown.appendChild(opt); }

      const container = document.getElementById('schedule-container'); container.innerHTML = '';
      curWeek.days.forEach((dayObj, dayIdx) => {
        const dayHours = dayObj.tasks.reduce((sum, t) => sum + (t.done ? t.dur : 0), 0); const dayTotal = dayObj.tasks.reduce((sum, t) => sum + t.dur, 0); const isDone = dayHours === dayTotal;

        let tasksHTML = dayObj.tasks.map((t, taskIdx) => `
          <div class="subtask-item ${t.done ? 'completed' : ''}">
            <div class="subtask-row">
              <div class="subtask-left"><input type="checkbox" class="checkbox-custom" ${t.done ? 'checked' : ''} onchange="toggleSubTask(${dayIdx}, ${taskIdx})"><span class="subtask-name ${t.done ? 'done' : ''}">${t.name} <span style="color:var(--text-muted); font-size:0.7rem;">(${(t.dur * 60).toFixed(0)}m)</span></span></div>
              <div class="subtask-actions">
                <span class="tag-skill tag-${t.type}">${t.type}</span>
                <button class="btn-toggle-detail" onclick="toggleDetailDrawer('${dayIdx}_${taskIdx}')">Guide</button>
                <div class="meta-ratings">
                  <button class="btn-meta ${t.difficulty === 'easy' ? 'selected' : ''}" onclick="setDifficulty(${dayIdx}, ${taskIdx}, 'easy')">EZ</button>
                  <button class="btn-meta ${t.difficulty === 'med' ? 'selected' : ''}" onclick="setDifficulty(${dayIdx}, ${taskIdx}, 'med')">MD</button>
                  <button class="btn-meta ${t.difficulty === 'hard' ? 'selected' : ''}" onclick="setDifficulty(${dayIdx}, ${taskIdx}, 'hard')">HD</button>
                </div>
              </div>
            </div>
            <div class="subtask-details" id="drawer-${dayIdx}_${taskIdx}">📌 <strong>Guide:</strong> ${t.inst}</div>
          </div>
        `).join('');

        const dayBlock = document.createElement('div'); dayBlock.className = 'day-block';
        dayBlock.innerHTML = `
          <div class="day-header" onclick="const list = this.nextElementSibling; list.style.display = list.style.display === 'none' ? 'flex' : 'none';">
            <div style="display:flex; align-items:center; gap:0.6rem;"><span class="day-badge" style="${isDone ? 'background: var(--accent-emerald); color:#000;' : ''}">${dayObj.day}</span><span style="font-size: 0.85rem; font-weight: 800; ${isDone ? 'color: var(--text-muted);' : ''}">${dayObj.title}</span></div>
            <span style="font-size: 0.72rem; font-weight: 800; color: ${isDone ? 'var(--accent-emerald)' : 'var(--accent-amber)'};">${dayHours.toFixed(1)} / ${dayTotal.toFixed(1)}h</span>
          </div>
          <div class="subtask-list" style="display: ${isDone ? 'none' : 'flex'};">${tasksHTML}</div>
        `;
        container.appendChild(dayBlock);
      });

      const backlogContainer = document.getElementById('backlog-container'); document.getElementById('backlog-count').innerText = `${state.missedLessons.length} Queued`;
      backlogContainer.innerHTML = state.missedLessons.length === 0 ? '<div style="font-size: 0.75rem; color: var(--accent-emerald); padding: 0.4rem;">✅ Backlog clean!</div>' : state.missedLessons.map((lesson, idx) => `
            <div style="background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.3); border-radius: 8px; padding: 0.4rem 0.6rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem;">
              <span>📌 ${lesson}</span><button class="btn" style="padding: 0.15rem 0.4rem; font-size: 0.65rem;" onclick="removeMissedLesson(${idx})">Done</button>
            </div>`).join('');

      const skillTotals = getSkillTotals(); updateChart(skillTotals); generateAIInsight(skillTotals); renderMissions();
    }

    render();
  </script>
